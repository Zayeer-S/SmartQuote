name: cd

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup
        with:
          node-version: "22"

      - name: Type check client
        run: npm run type-check:client

      - name: Type check server
        run: npm run type-check:server

      - name: Build all (client + server + db)
        run: npm run build:all
        env:
          VITE_APP_URL: https://smartquote.zayeer.dev
          VITE_FRONTEND_URL: https://smartquote.zayeer.dev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Deploy database stack
        working-directory: infra
        run: npx cdk deploy SmartQuoteDatabaseStack --require-approval never

      - name: Deploy app stack
        working-directory: infra
        run: npx cdk deploy SmartQuoteAppStack --require-approval never

      - name: Run Database Migrations
        run: |
          aws lambda invoke \
            --function-name smartquote-migrate \
            --region eu-west-2 \
            response.json

          # Check if the Lambda actually succeeded (it might return 200 but have an error in the payload)
          if grep -q "FunctionError" response.json; then
            echo "Migration failed!"
            cat response.json
            exit 1
          fi
          cat response.json
