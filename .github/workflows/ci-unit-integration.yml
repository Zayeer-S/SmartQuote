name: ci-unit-integration

on:
    push:
        branches-ignore:
            - "main"
        paths-ignore:
            - "**/*.md"
            - "docs/**"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.head_ref == '')
        name: Code Quality
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_DB: smartquote_test
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            NODE_ENV: test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup
              with:
                  node-version: "22"

            - uses: ./.github/actions/code-quality

            - name: Type check client
              run: npm run type-check:client

            - name: Type check server
              run: npm run type-check:server

            - name: Run unit tests
              run: npm run test:unit:server

            - name: Run integration tests
              run: npm run test:integration
